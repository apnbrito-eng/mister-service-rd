<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1100" fill="#fafafa"/>

  <!-- Title -->
  <text x="700" y="50" font-size="28" font-weight="700" fill="#0f3460" text-anchor="middle">Flujo Orden de Servicio · Mister Service RD</text>
  <text x="700" y="78" font-size="13" fill="#6b7280" text-anchor="middle">Desde creación hasta facturación · estado del código al 2026-05-16</text>

  <!-- ROW 1 - Creación -->
  <!-- Box 1: Cliente -->
  <rect x="60" y="120" width="220" height="120" rx="14" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text x="170" y="148" font-size="13" font-weight="700" fill="#713F12" text-anchor="middle">1 · CLIENTE CONTACTA</text>
  <text x="170" y="172" font-size="11" fill="#4B5563" text-anchor="middle">WhatsApp / Form web / Llamada</text>
  <text x="170" y="190" font-size="11" fill="#4B5563" text-anchor="middle">Origen: formulario_publico,</text>
  <text x="170" y="206" font-size="11" fill="#4B5563" text-anchor="middle">whatsapp, oficina</text>
  <text x="170" y="228" font-size="11" font-weight="600" fill="#7C2D12" text-anchor="middle">→ citas_por_confirmar</text>

  <!-- Arrow 1→2 -->
  <line x1="285" y1="180" x2="345" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Secretaria -->
  <rect x="350" y="120" width="220" height="120" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="460" y="148" font-size="13" font-weight="700" fill="#1E3A8A" text-anchor="middle">2 · SECRETARIA</text>
  <text x="460" y="172" font-size="11" fill="#4B5563" text-anchor="middle">Registra/confirma cita</text>
  <text x="460" y="190" font-size="11" fill="#4B5563" text-anchor="middle">Asigna técnico (P-006 ✓)</text>
  <text x="460" y="208" font-size="11" fill="#4B5563" text-anchor="middle">Auto-detecta operaria del técnico</text>
  <text x="460" y="228" font-size="11" font-weight="600" fill="#1E40AF" text-anchor="middle">→ OS-XXXX · Agendado</text>

  <!-- Arrow 2→3 -->
  <line x1="575" y1="180" x2="635" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

