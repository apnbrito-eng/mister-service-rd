  <text x="1100" y="610" font-size="11" fill="#4B5563" text-anchor="middle">/admin/facturacion-pendiente</text>
  <text x="1100" y="626" font-size="11" fill="#4B5563" text-anchor="middle">Modal Procesar (SPRINT-151):</text>
  <text x="1100" y="642" font-size="11" fill="#4B5563" text-anchor="middle">▸ Items editables · Notas</text>
  <text x="1100" y="658" font-size="11" fill="#4B5563" text-anchor="middle">▸ Garantía pre-poblada del wizard</text>
  <text x="1100" y="674" font-size="11" fill="#4B5563" text-anchor="middle">▸ Verificar pago checkbox</text>
  <text x="1100" y="700" font-size="11" font-weight="600" fill="#1E40AF" text-anchor="middle">→ CG-XXXXX · fase: Cerrado</text>

  <!-- Arrow 6→7 -->
  <line x1="1100" y1="730" x2="1100" y2="780" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 7: Cliente recibe -->
  <rect x="940" y="785" width="320" height="120" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="1100" y="813" font-size="13" font-weight="700" fill="#92400E" text-anchor="middle">6 · CLIENTE RECIBE</text>
  <text x="1100" y="837" font-size="11" fill="#4B5563" text-anchor="middle">WhatsApp con link de conduce + garantía</text>
  <text x="1100" y="855" font-size="11" fill="#4B5563" text-anchor="middle">Token expira en N días (SPRINT-140)</text>
  <text x="1100" y="873" font-size="11" fill="#4B5563" text-anchor="middle">Puede reclamar garantía 60 días desde cierre</text>
  <text x="1100" y="895" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">/garantia/{token}</text>

