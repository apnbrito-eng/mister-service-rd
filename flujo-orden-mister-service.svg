  <rect x="640" y="120" width="220" height="120" rx="14" fill="#FCE7F3" stroke="#DB2777" stroke-width="2"/>
  <text x="750" y="148" font-size="13" font-weight="700" fill="#831843" text-anchor="middle">3 · TÉCNICO LLEGA</text>
  <text x="750" y="172" font-size="11" fill="#4B5563" text-anchor="middle">Click "Iniciar chequeo"</text>
  <text x="750" y="190" font-size="11" fill="#4B5563" text-anchor="middle">Foto del equipo + captura GPS</text>
  <text x="750" y="208" font-size="11" fill="#4B5563" text-anchor="middle">(rules R4 verifican operaria)</text>
  <text x="750" y="228" font-size="11" font-weight="600" fill="#9F1239" text-anchor="middle">→ En Diagnóstico</text>

  <!-- Bifurcación -->
  <text x="950" y="155" font-size="14" font-weight="700" fill="#374151" text-anchor="middle">↓</text>
  <text x="950" y="175" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">¿Repara in-situ?</text>

  <!-- Línea bifurcación -->
  <line x1="950" y1="180" x2="950" y2="320" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="700" y1="320" x2="1200" y2="320" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- ROW 2 - Bifurcación -->
  <!-- Path A: Solo chequeo -->
  <rect x="540" y="340" width="320" height="150" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="700" y="370" font-size="14" font-weight="700" fill="#991B1B" text-anchor="middle">PATH A · SOLO CHEQUEO</text>
  <text x="700" y="392" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">(no se repara in-situ)</text>
  <text x="700" y="418" font-size="11" fill="#4B5563" text-anchor="middle">▸ Técnico sugiere monto + motivo</text>
  <text x="700" y="436" font-size="11" fill="#4B5563" text-anchor="middle">▸ Coord aprueba en /sugerencias-chequeo</text>
  <text x="700" y="454" font-size="11" fill="#4B5563" text-anchor="middle">▸ tipoCierre: solo_chequeo · precioFinal seteado</text>
  <text x="700" y="478" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">Vigencia 30 días: aplicable a cotización futura</text>

  <!-- Path B: Cotización con piezas -->
  <rect x="900" y="340" width="320" height="150" rx="14" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="1060" y="370" font-size="14" font-weight="700" fill="#065F46" text-anchor="middle">PATH B · COTIZACIÓN CON PIEZAS</text>
  <text x="1060" y="392" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">(repara con piezas)</text>
  <text x="1060" y="418" font-size="11" fill="#4B5563" text-anchor="middle">▸ Técnico cotiza piezas + mano de obra</text>
  <text x="1060" y="436" font-size="11" fill="#4B5563" text-anchor="middle">▸ Operaria autoriza precio</text>
  <text x="1060" y="454" font-size="11" fill="#4B5563" text-anchor="middle">▸ Coord visto final · fase: Aprobado</text>
  <text x="1060" y="478" font-size="11" font-weight="600" fill="#047857" text-anchor="middle">SPRINT-173: fase avanza al aprobar</text>

  <!-- Arrows convergen al cierre -->
  <line x1="700" y1="495" x2="700" y2="555" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1060" y1="495" x2="700" y2="555" stroke="#374151" stroke-width="2" stroke-dasharray="2 2" marker-end="url(#arrow)"/>

