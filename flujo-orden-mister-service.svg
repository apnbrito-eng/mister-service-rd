  <text x="700" y="626" font-size="11" fill="#4B5563" text-anchor="middle">✓ Revisó conexiones?</text>
  <text x="700" y="642" font-size="11" fill="#4B5563" text-anchor="middle">✓ Foto del cierre + Firma del cliente</text>
  <text x="700" y="658" font-size="11" fill="#4B5563" text-anchor="middle">✓ Período de garantía (default 60 días)</text>
  <text x="700" y="676" font-size="11" fill="#4B5563" text-anchor="middle">✓ Piezas usadas (opcional, solo path B)</text>
  <text x="700" y="700" font-size="11" font-weight="600" fill="#9F1239" text-anchor="middle">→ Trabajo Realizado</text>

  <!-- Arrow 5→6 -->
  <line x1="865" y1="640" x2="935" y2="640" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

