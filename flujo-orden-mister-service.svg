  <text x="80" y="612" font-size="11" fill="#4B5563">▸ Notificaciones: operaria, coord, admins</text>
  <text x="80" y="630" font-size="11" fill="#4B5563">▸ Audit log en orden.auditoria[] + auditoria_admin</text>
  <text x="80" y="648" font-size="11" fill="#4B5563">▸ Comisión técnico registrada (utils/comisiones.ts)</text>
  <text x="80" y="666" font-size="11" fill="#4B5563">▸ KPI dashboard: Conduces ↑, Órdenes en curso ↓</text>
  <text x="80" y="684" font-size="11" fill="#4B5563">▸ Storage: fotos-servicio/, firmas_cierre/</text>
  <text x="80" y="702" font-size="11" fill="#4B5563">▸ Cazadores P-001 a P-011 protegen invariantes</text>

  <!-- Hallazgos del QA E2E 2026-05-16 -->
  <rect x="60" y="745" width="860" height="280" rx="14" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="490" y="775" font-size="14" font-weight="700" fill="#991B1B" text-anchor="middle">Hallazgos QA E2E · sesión 2026-05-16 · OS-0058 / CG-00020</text>

  <text x="80" y="803" font-size="11" font-weight="700" fill="#7F1D1D">CRÍTICO / ALTO</text>
  <text x="80" y="821" font-size="11" fill="#374151">▸ #17 Lógica 30 días vigencia chequeo + descuento a cotización NO implementada</text>

  <text x="80" y="847" font-size="11" font-weight="700" fill="#9F1239">MEDIO</text>
  <text x="80" y="865" font-size="11" fill="#374151">▸ #1 Toast "(cliente creado)" cuando es asociado al existente</text>
  <text x="80" y="881" font-size="11" fill="#374151">▸ #9 permission-denied en console al cargar /tecnico (listener sin filter)</text>
  <text x="80" y="897" font-size="11" fill="#374151">▸ #10 Stepper visual no refleja atajo "Solo chequeo"</text>
  <text x="80" y="913" font-size="11" fill="#374151">▸ #11 Wizard cierre no se adapta a soloChequeo: true</text>
  <text x="80" y="929" font-size="11" fill="#374151">▸ #13 Wizard pregunta mangueras de desagüe en Aire Acondicionado</text>

  <text x="80" y="955" font-size="11" font-weight="700" fill="#A16207">BAJO / DOC</text>
  <text x="80" y="973" font-size="11" fill="#374151">▸ #2,3,4,5,7,12,14,15,16 — listado completo en sesión Cowork</text>

  <text x="80" y="1005" font-size="11" font-style="italic" fill="#6B7280">Validaciones OK: SPRINT-159 firma · SPRINT-158a foto · SPRINT-160 garantía 60d · SPRINT-161 fase cerrado · SPRINT-170 operaria autoinforma · SPRINT-173 (path B)</text>

  <!-- Leyenda -->
  <rect x="940" y="940" width="400" height="85" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1140" y="965" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Leyenda actores</text>
  <rect x="955" y="978" width="14" height="14" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="975" y="990" font-size="11" fill="#374151">Cliente</text>
  <rect x="1040" y="978" width="14" height="14" fill="#DBEAFE" stroke="#2563EB"/>
  <text x="1060" y="990" font-size="11" fill="#374151">Oficina (Sec/Op/Coord/Admin)</text>
  <rect x="955" y="1000" width="14" height="14" fill="#FCE7F3" stroke="#DB2777"/>
  <text x="975" y="1012" font-size="11" fill="#374151">Técnico</text>
  <rect x="1040" y="1000" width="14" height="14" fill="#FEE2E2" stroke="#DC2626"/>
  <text x="1060" y="1012" font-size="11" fill="#374151">Path A · Solo chequeo</text>
  <rect x="1230" y="1000" width="14" height="14" fill="#D1FAE5" stroke="#059669"/>
